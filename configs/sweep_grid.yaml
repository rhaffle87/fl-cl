# ─────────────────────────────────────────────────────────────
# FL-CL Hyperparameter Sweep Configuration
# ─────────────────────────────────────────────────────────────
# This file defines the search space for the sweep controller.
# ─────────────────────────────────────────────────────────────

experiment:
  name: "FCL-Hyperparameter-Sweep"
  description: "Grid search sweep over ewc_lambda, lr, batch_size, and rounds"

sweep:
  parameters:
    cl.ewc_lambda: [0.1, 0.4, 0.8]
    training.lr: [0.001, 0.005, 0.01]
    training.batch_size: [16, 32, 64]
    fl.rounds: [3]
