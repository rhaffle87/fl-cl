name: Model Promotion Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOYMENT_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Automatically trust the aggregator host keys
          ssh-keyscan -H 10.10.130.10 >> ~/.ssh/known_hosts || true

      - name: Synchronize Code to Aggregator
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 root@10.10.130.10 "mkdir -p /root/fl-cl/tools /root/fl-cl/src /root/.ssh"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -r tools/* root@10.10.130.10:/root/fl-cl/tools/
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -r src/* root@10.10.130.10:/root/fl-cl/src/
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ~/.ssh/id_ed25519 root@10.10.130.10:/root/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 root@10.10.130.10 "chmod 600 /root/.ssh/id_ed25519"

      - name: Run Promotion Gate
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 root@10.10.130.10 "/opt/flower-env/bin/python3 /root/fl-cl/tools/ci_cd_promote.py"
